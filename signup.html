<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnrukiShop Login</title>
    <link rel="stylesheet" href="CSS/index.css" />
    <link rel="stylesheet" href="CSS/signup.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
</head>

<body>

    <div class="container">
        <h1 class="logo"><a href="index.html">AnrukiShop<i class="fa-solid fa-bag-shopping"></i></a></h1>
        <div class="form" id="form">
            <h2>Sign Up</h2>
            <span>Please enter your email</span>
            <input type="email" id="email" placeholder="Email" required>
            <button id="sendCodeBtn">Send verification code</button>
            <p id="message"></p>
        </div>
    </div>
    <script type="module" src="JS/features/auth/signup.js"></script>
</body>

</html>
